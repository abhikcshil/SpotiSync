{% extends 'base.html' %}
{% block content %}
<h1 class="mb-3">{{ job.job_type|capitalize }} job</h1>
<div class="card">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div><strong>Job ID:</strong> <code>{{ job.job_id }}</code></div>
      <span id="job-status" class="badge text-bg-secondary">{{ job.status }}</span>
    </div>

    <div class="progress mb-2" role="progressbar" aria-valuemin="0" aria-valuemax="100">
      <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%">0%</div>
    </div>
    <div id="progress-counts" class="small text-muted mb-3">Starting...</div>
    <div id="current-message" class="mb-3">{{ job.current_message }}</div>

    <div id="error-box" class="alert alert-danger d-none"></div>

    <div id="result-box" class="d-none">
      <h2 class="h5">Result summary</h2>
      <pre id="result-json" class="log-box"></pre>
    </div>

    <div class="mt-3">
      <a href="{{ url_for('scan_page') }}" class="btn btn-outline-primary btn-sm">New scan</a>
      <a href="{{ url_for('sync_page') }}" class="btn btn-outline-success btn-sm">New sync</a>
      <a href="{{ url_for('reconcile_page') }}" class="btn btn-outline-warning btn-sm">New reconcile</a>
      <a href="{{ url_for('activity_page') }}" class="btn btn-outline-secondary btn-sm">View activity</a>
    </div>
  </div>
</div>

<script>
(function() {
  const jobId = {{ job.job_id|tojson }};
  const statusEl = document.getElementById('job-status');
  const progressBar = document.getElementById('progress-bar');
  const progressCounts = document.getElementById('progress-counts');
  const messageEl = document.getElementById('current-message');
  const errorBox = document.getElementById('error-box');
  const resultBox = document.getElementById('result-box');
  const resultJson = document.getElementById('result-json');

  let timer = null;

  function statusBadgeClass(status) {
    if (status === 'completed') return 'badge text-bg-success';
    if (status === 'failed') return 'badge text-bg-danger';
    if (status === 'running') return 'badge text-bg-primary';
    return 'badge text-bg-secondary';
  }

  function updateProgress(job) {
    statusEl.className = statusBadgeClass(job.status);
    statusEl.textContent = job.status;

    messageEl.textContent = job.current_message || '';

    if (job.progress_percent !== null && job.progress_percent !== undefined) {
      progressBar.classList.remove('progress-bar-animated');
      progressBar.style.width = `${job.progress_percent}%`;
      progressBar.textContent = `${job.progress_percent}%`;
    } else {
      progressBar.classList.add('progress-bar-animated');
      progressBar.style.width = '100%';
      progressBar.textContent = 'Working...';
    }

    if (job.progress_total !== null && job.progress_total !== undefined) {
      progressCounts.textContent = `Processed ${job.progress_current} / ${job.progress_total}`;
    } else {
      progressCounts.textContent = `Processed ${job.progress_current}`;
    }

    if (job.status === 'completed') {
      resultBox.classList.remove('d-none');
      resultJson.textContent = JSON.stringify(job.result || {}, null, 2);
      clearInterval(timer);
    }

    if (job.status === 'failed') {
      errorBox.classList.remove('d-none');
      errorBox.textContent = job.error_message || 'Unknown job failure';
      clearInterval(timer);
    }
  }

  async function poll() {
    const response = await fetch(`/jobs/${jobId}/status`, {cache: 'no-store'});
    if (!response.ok) {
      clearInterval(timer);
      errorBox.classList.remove('d-none');
      errorBox.textContent = 'Failed to load job status.';
      return;
    }
    const data = await response.json();
    updateProgress(data);
  }

  poll();
  timer = setInterval(poll, 1000);
})();
</script>
{% endblock %}
