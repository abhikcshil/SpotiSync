{% extends 'base.html' %}
{% block content %}
<h1>Scan local folders</h1>
<form method="post" class="mb-4">
  <div class="mb-3">
    <label class="form-label">Folders (one per line)</label>
    <textarea class="form-control" name="folders" rows="5" placeholder="/Users/you/Music\n/mnt/dj_pool">{{ folders }}</textarea>
  </div>
  <button class="btn btn-primary" type="submit">Start scan</button>
</form>
<p class="text-muted">Scan jobs now run in the background. You will be redirected to a live progress page.</p>
{% endblock %}
