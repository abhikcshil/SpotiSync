{% extends 'base.html' %}
{% block content %}
<h1>Sync to Spotify</h1>
<form method="post" class="row g-3 align-items-end mb-4">
  <div class="col-md-3">
    <label class="form-label">Limit (optional)</label>
    <input class="form-control" name="limit" type="number" min="1" placeholder="200" value="{{ limit }}">
  </div>
  <div class="col-md-3">
    <button class="btn btn-success" type="submit">Start sync</button>
  </div>
</form>
<p class="text-muted">Sync jobs now run in the background with live status updates.</p>
{% endblock %}
